<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barkeeper Bjorn</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app">
  <header>
    <a href="#dashboard" class="header-logo">
      <img id="header-avatar" class="header-avatar" alt="Barkeeper Bjorn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 2l-1 7H5a1 1 0 0 0-1 1v1a5 5 0 0 0 5 5h6a5 5 0 0 0 5-5v-1a1 1 0 0 0-1-1h-2L16 2z"/>
        <path d="M12 15v7"/>
        <path d="M8 22h8"/>
      </svg>
      <span>Barkeeper Bjorn</span>
    </a>

    <nav id="main-nav">
      <a href="#dashboard" data-route="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#inventory" data-route="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M3 10h18M3 15h18M3 20h18"/></svg>
        <span>Inventory</span>
      </a>
      <a href="#recipes" data-route="recipes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Recipes</span>
      </a>
      <a href="#profile" data-route="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>Profile</span>
      </a>
      <a href="#recommender" data-route="recommender">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span>Recommend</span>
      </a>
      <a href="#shopping" data-route="shopping">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>Shopping</span>
      </a>
      <a href="#setup" data-route="setup" class="nav-setup-btn" id="nav-setup-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        <span>Setup</span>
      </a>
      <a href="#settings" data-route="settings" class="nav-setup-btn" id="nav-settings-link" style="display:none" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/>
        </svg>
        <span>Settings</span>
      </a>
    </nav>
  </header>

  <main id="main-content">
    <!-- Views render here -->
  </main>
</div>

<div id="toast-container"></div>

<!-- Core modules (order matters) -->
<script src="js/github-api.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>

<!-- Recommender data + engine -->
<script src="js/classics-db.js"></script>
<script src="js/recommender-engine.js"></script>

<!-- Views -->
<script src="js/views/setup.js"></script>
<script src="js/views/dashboard.js"></script>
<script src="js/views/onboarding.js"></script>
<script src="js/views/inventory.js"></script>
<script src="js/views/recipes.js"></script>
<script src="js/views/profile.js"></script>
<script src="js/views/shopping.js"></script>
<script src="js/views/recommender.js"></script>

<!-- App entry point (must be last) -->
<script src="js/app.js"></script>
</body>
</html>
